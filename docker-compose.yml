services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      WIKI_APP_NAME: wiki-engine
      WIKI_ENVIRONMENT: development
      WIKI_DATABASE_URL: postgresql://wiki:wiki@postgres:5432/wiki_engine
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wiki_engine
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mariadb:
    image: mariadb:10.6-lts
    profiles:
      - mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: wiki_engine
      MARIADB_USER: wiki
      MARIADB_PASSWORD: wiki
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  postgres_data:
  mariadb_data:
